<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:var(--panel)}
  .wrap{padding:22px 26px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:72px;border-radius:var(--r-card)}
  .n{font-family:var(--font-ui);font-weight:700;font-size:12px;color:var(--ink)}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#a68462"></div><div class="n">brown-frame</div><div class="h">#A68462 · hairline</div></div>
  <div class="sw"><div class="chip" style="background:#6f563f"></div><div class="n">brown-deep</div><div class="h">#6F563F · sub</div></div>
  <div class="sw"><div class="chip" style="background:#c9b8a8"></div><div class="n">brown-soft</div><div class="h">#C9B8A8 · border</div></div>
  <div class="sw"><div class="chip" style="background:#e7dfd6"></div><div class="n">panel-edge</div><div class="h">#E7DFD6 · hairlines</div></div>
</div></body></html>
