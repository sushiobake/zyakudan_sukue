<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:var(--panel)}
  .row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .ribbon{display:inline-block;padding:6px 18px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.42em;color:#fffdf9;background:linear-gradient(90deg,#e8789a,#f5b0c4);border-radius:3px}
  .ribbon.gold{background:linear-gradient(90deg,#d4a017,#f0d090)}
  .ribbon.steel{background:linear-gradient(90deg,#5a6a78,#8a9aaa)}
  .rank{font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:18px;color:#c73e6e;margin:0 0 4px}
  .grp{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .h{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;margin-top:4px}
</style></head>
<body>
  <div class="row">
    <div class="grp"><span class="ribbon gold">ENDING</span><p class="rank">全知の恋愛神</p><div class="h">481+ / 500</div></div>
    <div class="grp"><span class="ribbon">ENDING</span><p class="rank">現場の神</p><div class="h">401–480</div></div>
    <div class="grp"><span class="ribbon">ENDING</span><p class="rank">救世主見習い</p><div class="h">301–400</div></div>
    <div class="grp"><span class="ribbon steel">ENDING</span><p class="rank">見守るしかない神</p><div class="h">0–200</div></div>
  </div>
</body></html>
