<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:var(--panel);display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
  .opt{display:flex;flex-direction:column;gap:12px;align-items:center}
  .opt img{width:96px;height:96px;border-radius:18px;box-shadow:0 8px 24px rgba(90,72,58,.1)}
  .opt b{font-family:var(--font-display);font-weight:800;font-size:14px;color:var(--ink);margin-top:4px}
  .opt span{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase}
  .row{display:flex;gap:14px;align-items:center;margin-top:10px}
  .tab{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--panel-edge);border-radius:6px;background:var(--page-warm)}
  .tab img{width:16px;height:16px;border-radius:3px;box-shadow:none}
  .tab .t{font-family:var(--font-ui);font-size:11px;color:var(--ink)}
</style></head>
<body>
  <div class="opt">
    <img src="../assets/logos/mark.svg" alt="">
    <b>A · sun-horizon</b>
    <span>abstract · brand imagery</span>
    <div class="row">
      <div class="tab"><img src="../assets/logos/mark.svg" alt=""><span class="t">弱者男性を救え！ — sushiobake</span></div>
    </div>
  </div>

  <div class="opt">
    <img src="../assets/logos/mark-stamp.svg" alt="">
    <b>B · 寿 stamp</b>
    <span>typographic · references 寿司</span>
    <div class="row">
      <div class="tab"><img src="../assets/logos/mark-stamp.svg" alt=""><span class="t">弱者男性を救え！ — sushiobake</span></div>
    </div>
  </div>
</body></html>
