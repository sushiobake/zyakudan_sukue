<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>

<body><div class="specimen">
  <div class="meta">SHIPPORI MINCHO B1 · 600 / 800 · DISPLAY</div>
  <div class="big">弱者男性を救え！</div>
