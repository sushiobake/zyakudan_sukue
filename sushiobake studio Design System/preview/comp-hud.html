<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:url('../assets/backgrounds/haikei4.png') center/cover no-repeat,#3a3144;background-blend-mode:darken;background-color:rgba(40,30,50,.3)}
  .grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .pill{display:flex;flex-direction:column;gap:2px;padding:8px 14px;border-radius:999px;background:rgba(28,24,36,.72);border:1px solid rgba(255,255,255,.12);box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .pill .s{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.65)}
  .pill .c{font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;font-weight:700;color:#fff}
  .hint{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:4px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.85);background:rgba(28,24,36,.55);border:1px solid rgba(255,255,255,.1)}
  .hint .k{color:rgba(232,160,200,.95);font-size:13px}
  .lab{margin-top:12px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:rgba(255,255,255,.6)}
</style></head>
<body>
  <div class="grid">
    <div class="pill"><span class="s">SCENE 03/05</span><span class="c">第1章：まずは呼吸を整えよう</span></div>
    <span class="hint"><span class="k">▼</span>NEXT</span>
    <span class="hint">TITLE</span>
  </div>
  <div class="lab">HUD · TOP-RIGHT PILL · BOTTOM-RIGHT HINTS</div>
</body></html>
