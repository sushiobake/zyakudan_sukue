<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:30px 28px;background:url('../assets/backgrounds/haikei1.png') center/cover no-repeat,#3a3144;display:grid;place-items:center;background-blend-mode:darken;background-color:rgba(50,40,60,.2)}
  .card{width:min(440px,100%);padding:28px;border-radius:8px;text-align:center;background:linear-gradient(165deg,rgba(255,253,249,.96),rgba(254,245,236,.94));border:2px solid rgba(166,132,98,.42);box-shadow:0 0 0 1px rgba(255,255,255,.65) inset,0 26px 70px rgba(90,72,58,.14);backdrop-filter:blur(14px)}
  .ribbon{display:inline-block;margin:0 0 14px;padding:6px 18px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.42em;color:#fffdf9;background:linear-gradient(90deg,#e8789a,#f5b0c4);border-radius:3px}
  .rank{margin:0 0 8px;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:20px;color:#c73e6e;letter-spacing:.04em}
  .score{margin:0 0 12px;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:38px;color:#3d342c}
  .score .s{margin:0 6px;opacity:.35}
  .score .sf{font-size:.55em;letter-spacing:.08em;color:rgba(61,52,44,.72)}
  .copy{margin:0;font-family:'Noto Serif JP',serif;font-size:14px;line-height:1.85;color:rgba(61,52,44,.72)}
</style></head>
<body><div class="card">
  <p class="ribbon">ENDING</p>
  <p class="rank">現場の神</p>
  <h2 class="score">420<span class="s">/</span>500<span class="sf"> score</span></h2>
  <p class="copy">弱者男性を、穏やかに救えた。</p>
</div></body></html>
