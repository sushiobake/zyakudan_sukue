<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:var(--panel);display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:26px 28px;border-right:1px solid var(--panel-edge);min-height:170px;display:flex;flex-direction:column;justify-content:center;gap:14px}
  .cell:nth-child(2){border-right:none}
  .cell:nth-child(3){border-top:1px solid var(--panel-edge);border-right:1px solid var(--panel-edge)}
  .cell:nth-child(4){border-top:1px solid var(--panel-edge)}

  .tag{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase}

  /* —— A. monogram + wordmark —— */
  .a{display:flex;align-items:center;gap:14px}
  .a .glyph{
    width:46px;height:46px;border-radius:50%;
    background:var(--ink);color:#fffdf9;
    font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:24px;
    display:grid;place-items:center;letter-spacing:-.02em
  }
  .a .name{display:flex;flex-direction:column;line-height:1.1}
  .a .name b{font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:20px;color:var(--ink);letter-spacing:.01em}
  .a .name span{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.32em;color:var(--ink-muted);text-transform:uppercase;margin-top:3px}

  /* —— B. all-lowercase mincho wordmark —— */
  .b .word{font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:30px;color:var(--ink);letter-spacing:-.01em;font-style:italic}
  .b .word .dot{color:var(--rose)}
  .b .sub{font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:.3em;color:var(--ink-faint);text-transform:uppercase;margin-top:6px}

  /* —— C. capsule lockup —— */
  .c .pill{display:inline-flex;align-items:center;gap:10px;padding:8px 16px;border:1px solid var(--brown-frame);border-radius:999px;background:#fffdf9}
  .c .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--rose)}
  .c .pill .name{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:14px;color:var(--ink);letter-spacing:.04em}
  .c .pill .name em{font-style:normal;color:var(--brown-deep);font-weight:600}

  /* —— D. stamp lockup (vertical kanji + romaji) —— */
  .d{display:flex;align-items:center;gap:14px}
  .d .stamp{
    width:48px;height:60px;display:grid;place-items:center;
    border:1.5px solid var(--rose);color:var(--rose);
    font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:30px;
    background:rgba(232,120,154,0.04)
  }
  .d .text{display:flex;flex-direction:column;gap:2px}
  .d .text b{font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:18px;color:var(--ink);letter-spacing:.02em}
  .d .text span{font-family:'Noto Serif JP',serif;font-size:11px;letter-spacing:.06em;color:var(--ink-muted)}
</style></head>
<body>
  <div class="cell">
    <div class="tag">A · monogram + wordmark</div>
    <div class="a">
      <div class="glyph">寿</div>
      <div class="name"><b>sushiobake</b><span>STUDIO</span></div>
    </div>
  </div>

  <div class="cell b">
    <div class="tag">B · italic mincho wordmark</div>
    <div>
      <div class="word">sushiobake<span class="dot">.</span></div>
      <div class="sub">STUDIO · TOKYO</div>
    </div>
  </div>

  <div class="cell c">
    <div class="tag">C · capsule lockup</div>
    <div>
      <div class="pill"><span class="dot"></span><span class="name">sushiobake <em>studio</em></span></div>
    </div>
  </div>

  <div class="cell">
    <div class="tag">D · stamp + romaji</div>
    <div class="d">
      <div class="stamp">寿</div>
      <div class="text"><b>sushiobake</b><span>恋愛ノベル制作所</span></div>
    </div>
  </div>
</body></html>
