<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:var(--panel)}
  .ink-card{padding:22px 26px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .ink-swatch{display:flex;flex-direction:column;gap:8px}
  .ink-chip{height:72px;border-radius:var(--r-card)}
  .ink-name{font-family:var(--font-ui);font-weight:700;font-size:12px;color:var(--ink)}
  .ink-hex{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
</style></head>
<body><div class="ink-card">
  <div class="ink-swatch"><div class="ink-chip" style="background:#3d342c"></div><div class="ink-name">ink</div><div class="ink-hex">#3D342C · primary text</div></div>
  <div class="ink-swatch"><div class="ink-chip" style="background:#3d342c;opacity:.72"></div><div class="ink-name">ink-muted</div><div class="ink-hex">72% · secondary</div></div>
  <div class="ink-swatch"><div class="ink-chip" style="background:#3d342c;opacity:.52"></div><div class="ink-name">ink-faint</div><div class="ink-hex">52% · captions</div></div>
  <div class="ink-swatch"><div class="ink-chip" style="background:#6f563f"></div><div class="ink-name">brown-deep</div><div class="ink-hex">#6F563F · sub-heads</div></div>
</div></body></html>
