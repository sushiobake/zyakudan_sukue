<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px 28px;background:var(--panel)}
  .scale{display:grid;grid-template-columns:80px 1fr;gap:14px 18px;align-items:baseline}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--ink-faint);text-transform:uppercase}
  .sample{font-family:'Shippori Mincho B1',serif;font-weight:700;color:var(--ink);line-height:1.15}
  .h1{font-size:44px;font-weight:800}.h2{font-size:26px}.h3{font-size:20px}
  .body{font-family:'Noto Serif JP',serif;font-weight:500;font-size:15px;color:var(--ink-muted);line-height:1.6}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);letter-spacing:.16em}
</style></head>
<body><div class="scale">
  <div class="label">H1 / 44</div><div class="sample h1">弱者男性を救え！</div>
  <div class="label">H2 / 26</div><div class="sample h2">第1章：呼吸を整えよう</div>
  <div class="label">H3 / 20</div><div class="sample h3">マッチングアプリ初手</div>
  <div class="label">body / 15</div><div class="body">あなたは神視点。彼を救う。</div>
  <div class="label">meta / 11</div><div class="meta">SCENE 03/05 · MONO</div>
</div></body></html>
