<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:#241c34}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;align-items:end}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .num{font-family:'Shippori Mincho B1','Noto Serif JP',serif;font-weight:800;font-size:72px;line-height:1;-webkit-background-clip:text;background-clip:text;color:transparent}
  .lbl{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.16em}
  .v{font-family:var(--font-ui);font-weight:700;color:#fff;font-size:12px}
  .s100{background:linear-gradient(180deg,#d4a017 8%,#e8789a 42%,#f6c4d4 100%)}
  .s80{background:linear-gradient(180deg,#e84874 12%,#f092aa 58%,#f6c4d4 100%)}
  .s60{background:linear-gradient(180deg,#d9782a 12%,#f0a868 58%,#f6d4b8 100%)}
  .s20{background:linear-gradient(180deg,#5a6a78 12%,#8a9aaa 58%,#b8c4d0 100%)}
  .s100,.s80,.s60,.s20{-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="num s100">100</div><div class="lbl">SCORE 100 · GOLD→ROSE</div><div class="v">完璧に近い</div></div>
  <div class="sw"><div class="num s80">80</div><div class="lbl">SCORE 80 · ROSE</div><div class="v">悪くない</div></div>
  <div class="sw"><div class="num s60">60</div><div class="lbl">SCORE 60 · WARM</div><div class="v">安全だが弱い</div></div>
  <div class="sw"><div class="num s20">20</div><div class="lbl">SCORE 20 · STEEL</div><div class="v">空気が固まる</div></div>
</div></body></html>
