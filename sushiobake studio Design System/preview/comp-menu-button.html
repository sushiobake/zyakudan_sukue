<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:url('../assets/backgrounds/haikei1.png') center/cover no-repeat,#241c34;background-blend-mode:darken;background-color:rgba(120,90,90,.35)}
  .stage{padding:32px 36px;min-height:240px;display:flex;align-items:flex-end;background:linear-gradient(180deg,transparent 30%,rgba(30,22,40,.6) 100%)}
  .menu{width:100%;max-width:520px;display:flex;flex-direction:column;gap:10px}
  .btn{position:relative;text-align:left;padding:14px 16px 14px 18px;border:1px solid rgba(166,132,98,.38);background:linear-gradient(105deg,rgba(255,253,249,.94) 0%,rgba(255,247,240,.82) 55%,rgba(255,253,249,.62) 100%);border-left:4px solid #f4c4d4;box-shadow:0 0 0 1px rgba(255,255,255,.65) inset,0 14px 34px rgba(90,72,58,.12);backdrop-filter:blur(12px);transition:all .18s ease;cursor:pointer}
  .btn:hover{transform:translateX(6px);border-left-color:#e8789a;box-shadow:0 0 0 1px rgba(255,255,255,.85) inset,0 18px 42px rgba(232,120,154,.18)}
  .k{display:inline-block;min-width:2.5rem;margin-right:10px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:#a68462;vertical-align:middle}
  .t{display:inline;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:17px;color:#3d342c;vertical-align:middle}
  .d{display:block;margin-top:6px;margin-left:calc(2.5rem + 10px);font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.55;color:rgba(61,52,44,.72)}
</style></head>
<body><div class="stage"><div class="menu">
  <button class="btn"><span class="k">01</span><span class="t">第1章：まずは呼吸を整えよう</span><span class="d">清潔感・距離感の入門。彼を、穏やかに救う。</span></button>
  <button class="btn"><span class="k">02</span><span class="t">第2章：街コン帰りの気まずさ</span><span class="d">店選び・誘い方・空気読み。</span></button>
</div></div></body></html>
