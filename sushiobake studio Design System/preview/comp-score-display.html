<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:28px;background:url('../assets/backgrounds/haikei1.png') center/cover no-repeat,#3a3144;background-blend-mode:darken;background-color:rgba(40,30,50,.25);min-height:240px;display:flex;align-items:flex-end}
  .body{width:min(640px,100%);border-radius:0 4px 4px 4px;padding:22px 28px;background:linear-gradient(105deg,rgba(36,28,52,.92) 0%,rgba(36,28,52,.88) 42%,rgba(36,28,52,.45) 72%,transparent 100%);display:flex;flex-direction:row;align-items:flex-start;gap:24px}
  .name{position:absolute;display:none}
  .score-inline{flex:0 0 auto;min-width:5.5rem;padding-top:4px}
  .num{margin:0;font-family:'Shippori Mincho B1',serif;font-weight:800;font-size:64px;line-height:1;background:linear-gradient(180deg,#e84874 12%,#f092aa 58%,#f6c4d4 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .unit{margin:0;font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:22px;color:rgba(255,255,255,.85)}
  .txt{flex:1;margin:0;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;line-height:1.7;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.55)}
  .wrap{position:relative;width:100%}
  .tab{position:absolute;top:-26px;left:0;display:inline-block;padding:5px 14px 4px;border-radius:2px 2px 0 0;background:rgba(72,48,96,.92);border:1px solid rgba(255,255,255,.12);border-bottom:none;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:12px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35)}
</style></head>
<body><div class="wrap">
  <span class="tab">講評</span>
  <div class="body">
    <div class="score-inline"><p class="num">80</p><p class="unit">点</p></div>
    <p class="txt">悪くはないが、相手によっては警戒される。文脈が欲しい。</p>
  </div>
</div></body></html>
