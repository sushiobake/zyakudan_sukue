<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:var(--panel)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:end}
  .box{background:var(--page);border:1px solid var(--panel-edge);height:72px;display:flex;align-items:flex-end;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);padding-bottom:6px;letter-spacing:.06em}
  .r0{border-radius:0}.r2{border-radius:2px}.r4{border-radius:4px}.r8{border-radius:8px}.rp{border-radius:999px}
  .label{font-family:var(--font-ui);font-weight:700;font-size:11px;color:var(--ink);margin-top:8px;text-align:center}
  .note{margin-top:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;text-align:center}
</style></head>
<body>
  <div class="grid">
    <div><div class="box r0">0</div><div class="label">sharp</div></div>
    <div><div class="box r2">2px</div><div class="label">dialog · choices</div></div>
    <div><div class="box r4">4px</div><div class="label">cards · default</div></div>
    <div><div class="box r8">8px</div><div class="label">hero · ending</div></div>
    <div><div class="box rp">∞</div><div class="label">HUD pill</div></div>
  </div>
  <div class="note">— mostly square. never 12+. —</div>
</body></html>
