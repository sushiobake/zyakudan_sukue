<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:var(--panel)}
  .row{display:flex;gap:10px;align-items:flex-end}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--rose-soft);width:32px}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
  .l{font-family:var(--font-ui);font-weight:700;font-size:11px;color:var(--ink)}
  .note{margin-top:16px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="l">1</div><div class="h">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="l">2</div><div class="h">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="l">3</div><div class="h">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="l">4</div><div class="h">16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="l">5</div><div class="h">20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="l">6</div><div class="h">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="l">7</div><div class="h">32</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="l">8</div><div class="h">40</div></div>
  </div>
  <div class="note">— 4px base · linear scale —</div>
</body></html>
