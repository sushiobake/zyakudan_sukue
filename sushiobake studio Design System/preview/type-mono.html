<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:28px;background:#241c34}
  .meta{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:12px}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .pill{padding:8px 14px;border-radius:999px;background:rgba(28,24,36,.72);border:1px solid rgba(255,255,255,.12);font-family:ui-monospace,monospace;color:#fff;font-size:11px;letter-spacing:.18em}
  .hint{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:4px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.85);background:rgba(28,24,36,.55);border:1px solid rgba(255,255,255,.1)}
  .hint .k{color:rgba(232,160,200,.95);font-size:13px}
  .cap{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:.28em;color:rgba(255,255,255,.55)}
</style></head>
<body>
  <div class="meta">MONO CAPS · TYPOGRAPHIC FURNITURE</div>
  <div class="row">
    <span class="pill">SCENE 03/05</span>
    <span class="hint"><span class="k">▼</span>NEXT</span>
    <span class="hint">TITLE</span>
  </div>
  <div class="cap">COMMAND SELECT</div>
</body></html>
