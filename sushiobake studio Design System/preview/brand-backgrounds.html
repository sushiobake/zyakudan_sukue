<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px;background:var(--panel)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .tile{aspect-ratio:16/9;position:relative;overflow:hidden;border-radius:4px;border:1px solid var(--panel-edge)}
  .tile img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.05) contrast(1.02) brightness(1.03)}
  .tile::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 50px rgba(88,70,56,.22),inset 0 -40px 60px rgba(150,120,98,.28);pointer-events:none}
  .tile::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 72% 58% at 74% 22%,rgba(255,248,230,.42),transparent 62%);mix-blend-mode:soft-light;z-index:1;pointer-events:none}
  .lab{margin-top:10px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;text-align:center}
</style></head>
<body>
  <div class="grid">
    <div class="tile"><img src="../assets/backgrounds/haikei1.png" alt=""></div>
    <div class="tile"><img src="../assets/backgrounds/haikei2.png" alt=""></div>
    <div class="tile"><img src="../assets/backgrounds/haikei3.png" alt=""></div>
    <div class="tile"><img src="../assets/backgrounds/haikei4.png" alt=""></div>
  </div>
  <div class="lab">— full-bleed · sat +5% · bloom + vignette + grain —</div>
</body></html>
