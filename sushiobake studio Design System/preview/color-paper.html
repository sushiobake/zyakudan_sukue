<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:var(--panel)}
  .wrap{padding:22px 26px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:72px;border-radius:var(--r-card);border:1px solid rgba(0,0,0,.05)}
  .n{font-family:var(--font-ui);font-weight:700;font-size:12px;color:var(--ink)}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#fffdf9"></div><div class="n">panel</div><div class="h">#FFFDF9 · cards</div></div>
  <div class="sw"><div class="chip" style="background:#fdf6ee"></div><div class="n">panel-2</div><div class="h">#FDF6EE · inner</div></div>
  <div class="sw"><div class="chip" style="background:#efe8df"></div><div class="n">page</div><div class="h">#EFE8DF · body bg</div></div>
  <div class="sw"><div class="chip" style="background:#f3e3cc"></div><div class="n">champagne</div><div class="h">#F3E3CC · warm wash</div></div>
</div></body></html>
