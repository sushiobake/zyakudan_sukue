<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px;background:url('../assets/backgrounds/haikei2.png') center/cover no-repeat,#3a3144}
  .overlay{padding:14px 16px;border-radius:4px;background:rgba(28,24,36,.82);border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 28px rgba(0,0,0,.28);max-width:520px}
  .cap{margin:0 0 12px;font-family:ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:.28em;color:rgba(255,255,255,.55)}
  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .row{cursor:pointer;display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:2px;border:1px solid rgba(255,255,255,.08);border-left:3px solid transparent;background:rgba(255,255,255,.06);color:#fff;font-family:'Zen Kaku Gothic New',sans-serif;font-size:14px;line-height:1.55;transition:all .14s ease;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .row.on{border-left-color:#e8789a;background:rgba(255,255,255,.12);transform:translateX(3px)}
  .idx{font-family:ui-monospace,monospace;font-size:12px;color:rgba(232,160,200,.95);min-width:1.75rem;text-align:center;padding-top:3px;letter-spacing:.08em}
</style></head>
<body><div class="overlay">
  <p class="cap">COMMAND SELECT</p>
  <ul>
    <li class="row on"><span class="idx">1</span><span>趣味と仕事と週末の過ごし方を、箇条書きで短く</span></li>
    <li class="row"><span class="idx">2</span><span>自己開示MAXの長文（努力と苦労の全履歴）</span></li>
    <li class="row"><span class="idx">3</span><span>「はじめまして」だけ送って終わり</span></li>
    <li class="row"><span class="idx">4</span><span>「可愛いですね」連打で勢いを見せる</span></li>
  </ul>
</div></body></html>
