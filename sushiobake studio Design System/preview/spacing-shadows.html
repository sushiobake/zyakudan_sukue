<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:30px 24px;background:var(--page)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
  .box{background:var(--panel);height:88px;border-radius:6px}
  .b1{box-shadow:0 8px 24px rgba(90,72,58,.06)}
  .b2{box-shadow:0 14px 34px rgba(90,72,58,.12)}
  .b3{box-shadow:0 14px 34px rgba(232,120,154,.28)}
  .b4{box-shadow:0 8px 28px rgba(0,0,0,.28);background:rgba(36,28,52,.92)}
  .lab{font-family:var(--font-ui);font-weight:700;font-size:11px;color:var(--ink);margin-top:14px}
  .h{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:.06em;margin-top:2px}
</style></head>
<body><div class="grid">
  <div><div class="box b1"></div><div class="lab">card</div><div class="h">0 8 24 / brown 6%</div></div>
  <div><div class="box b2"></div><div class="lab">pop / focus</div><div class="h">0 14 34 / brown 12%</div></div>
  <div><div class="box b3"></div><div class="lab">rose hover</div><div class="h">0 14 34 / rose 28%</div></div>
  <div><div class="box b4"></div><div class="lab">dialog</div><div class="h">0 8 28 / black 28%</div></div>
</div></body></html>
