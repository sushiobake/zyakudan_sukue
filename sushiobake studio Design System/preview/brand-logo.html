<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:22px;background:var(--panel);display:grid;grid-template-columns:160px 1fr;gap:24px;align-items:center}
  .mark{width:140px;height:140px;background:url('../assets/logos/favicon.svg') center/contain no-repeat;border-radius:8px;background-color:#fbf6f1;border:1px solid var(--panel-edge);box-shadow:0 8px 24px rgba(90,72,58,.06)}
  .note{font-family:'Zen Kaku Gothic New',sans-serif;color:var(--ink);font-size:13px;line-height:1.7}
  .note b{color:#c73e6e}
  .h{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:6px}
</style></head>
<body>
  <div class="mark"></div>
  <div class="note">
    <div class="h">FAVICON · PLACEHOLDER</div>
    Current mark is the Vite scaffold's purple lightning bolt — <b>not</b> a real sushiobake mark. Replace before launch with a wordmark or kanji-set symbol that matches the warm-cream palette.
  </div>
</body></html>
