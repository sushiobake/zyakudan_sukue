<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;background:#3a3144}
  .wrap{padding:22px 26px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:84px;border-radius:var(--r-card);border:1px solid rgba(255,255,255,.08)}
  .n{font-family:var(--font-ui);font-weight:700;font-size:12px;color:#fffdf9}
  .h{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.04em}
  .name-tag{padding:5px 14px 4px;border-radius:2px 2px 0 0;background:rgba(72,48,96,.92);border:1px solid rgba(255,255,255,.12);border-bottom:none;font-family:var(--font-ui);font-weight:700;font-size:11px;color:#fff;display:inline-block;margin-bottom:-2px;width:fit-content}
  .body-demo{background:linear-gradient(105deg,rgba(36,28,52,.92) 0%,rgba(36,28,52,.45) 72%,transparent 100%);padding:10px 14px;border-radius:0 3px 3px 3px;color:#fff;font-family:var(--font-ui);font-size:12px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:rgba(36,28,52,.92)"></div><div class="n">adv-body</div><div class="h">36 28 52 / 92%</div></div>
  <div class="sw"><div class="chip" style="background:rgba(72,48,96,.92)"></div><div class="n">adv-name</div><div class="h">72 48 96 / 92%</div></div>
  <div class="sw"><div>
    <div class="name-tag">由良 さくら</div>
    <div class="body-demo">……読みやすい。続きが気になる。</div>
  </div><div class="h" style="margin-top:6px">in-use · ADV window</div></div>
</div></body></html>
