<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cfefff"></stop>
      <stop offset="42%" stop-color="#fff6ec"></stop>
      <stop offset="78%" stop-color="#ffe8dc"></stop>
      <stop offset="100%" stop-color="#f7dfd4"></stop>
    </linearGradient>
    <linearGradient id="winLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"></stop>
      <stop offset="100%" stop-color="#dff6ff" stop-opacity="0.28"></stop>
    </linearGradient>
    <linearGradient id="floor" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e9cfa8"></stop>
      <stop offset="55%" stop-color="#cfaa78"></stop>
      <stop offset="100%" stop-color="#b88956"></stop>
    </linearGradient>
    <radialGradient id="sun" cx="78%" cy="22%" r="22%">
      <stop offset="0%" stop-color="#fffaf0"></stop>
      <stop offset="35%" stop-color="#ffe9c9" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#ffc89a" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="blurFar" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="4"></feGaussianBlur>
    </filter>
    <filter id="softBloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"></rect>
  <circle cx="1490" cy="260" r="140" fill="url(#sun)" filter="url(#softBloom)" opacity="0.85"></circle>

  
  <rect x="140" y="120" width="1640" height="420" rx="8" fill="#d9cfc4" opacity="0.55"></rect>
  <rect x="180" y="150" width="360" height="360" fill="#e9f6ff" stroke="#c9dce8" stroke-width="5"></rect>
  <rect x="580" y="150" width="360" height="360" fill="#e9f6ff" stroke="#c9dce8" stroke-width="5"></rect>
  <rect x="980" y="150" width="360" height="360" fill="#e9f6ff" stroke="#c9dce8" stroke-width="5"></rect>
  <rect x="1380" y="150" width="360" height="360" fill="#e9f6ff" stroke="#c9dce8" stroke-width="5"></rect>

  <rect x="180" y="150" width="360" height="360" fill="url(#winLight)" opacity="0.55"></rect>
  <rect x="580" y="150" width="360" height="360" fill="url(#winLight)" opacity="0.42"></rect>
  <rect x="980" y="150" width="360" height="360" fill="url(#winLight)" opacity="0.38"></rect>
  <rect x="1380" y="150" width="360" height="360" fill="url(#winLight)" opacity="0.62"></rect>

  <g stroke="#b8c9d6" stroke-width="6">
    <line x1="360" y1="150" x2="360" y2="510"></line>
    <line x1="760" y1="150" x2="760" y2="510"></line>
    <line x1="1160" y1="150" x2="1160" y2="510"></line>
    <line x1="1560" y1="150" x2="1560" y2="510"></line>
    <line x1="180" y1="330" x2="540" y2="330"></line>
    <line x1="580" y1="330" x2="940" y2="330"></line>
    <line x1="980" y1="330" x2="1340" y2="330"></line>
    <line x1="1380" y1="330" x2="1740" y2="330"></line>
  </g>

  
  <rect x="0" y="520" width="1920" height="220" fill="#efe6dc"></rect>
  <rect x="0" y="520" width="1920" height="22" fill="#e2d6cb"></rect>

  
  <rect x="320" y="560" width="1280" height="280" rx="12" fill="#2f453f" stroke="#5f7a72" stroke-width="6" filter="url(#blurFar)" opacity="0.94"></rect>
  <path d="M420 620 H1500 M460 670 H1460 M520 730 H1420" stroke="#a8c4bd" stroke-width="4" opacity="0.22" stroke-linecap="round"></path>

  
  <path d="M0 740 L1920 740 L1920 1080 L0 1080 Z" fill="url(#floor)"></path>
  <path d="M0 740 L420 740 L180 1080 L0 1080 Z" fill="#a67c52" opacity="0.35"></path>
  <path d="M1500 740 L1920 740 L1920 1080 L1560 1080 Z" fill="#a67c52" opacity="0.32"></path>

  
  <path d="M100 880 L380 780 L920 780 L1180 880 Z" fill="#8f684a" opacity="0.78"></path>
  <path d="M1280 900 L1580 810 L1820 810 L1880 900 Z" fill="#8f684a" opacity="0.68"></path>
  <rect x="160" y="900" width="1100" height="24" rx="4" fill="#6f513c" opacity="0.55"></rect>

  
  <ellipse cx="1540" cy="360" rx="440" ry="240" fill="#fff5ea" opacity="0.14"></ellipse>
</svg>