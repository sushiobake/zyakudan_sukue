<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弱者男性を救え！ — sushiobake studio</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/logos/mark.svg">
  <link rel="stylesheet" href="vn.css">
  <link rel="stylesheet" href="kit.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600;700&family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" data-screen-label="VN runtime"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="TitleScreen.jsx"></script>
  <script type="text/babel" src="QuizScreen.jsx"></script>
  <script type="text/babel" src="EndingCard.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;
    const QUESTIONS_PER_RUN = 3;       // kit uses 3 to keep the demo brisk
    const MAX_SCORE = QUESTIONS_PER_RUN * 100;

    function pickRun(level) {
      return { ...level, runQuestions: level.questions.slice(0, QUESTIONS_PER_RUN) };
    }

    function App() {
      const [screen, setScreen] = useState("title");
      const [level,  setLevel]  = useState(null);
      const [qIndex, setQ]      = useState(0);
      const [phase,  setPhase]  = useState("situation");
      const [picked, setPicked] = useState(null);
      const [scores, setScores] = useState([]);

      const start = useCallback((pack) => {
        setLevel(pickRun(pack));
        setQ(0); setPhase("situation"); setPicked(null); setScores([]);
        setScreen("quiz");
      }, []);

      const toTitle = useCallback(() => {
        setScreen("title"); setLevel(null); setQ(0);
        setPhase("situation"); setPicked(null); setScores([]);
      }, []);

      const advance = useCallback(() => {
        if (phase === "situation") setPhase("choices");
        else if (phase === "reaction") setPhase("score");
        else if (phase === "score") {
          if (!picked) return;
          setScores((p) => [...p, picked.score]);
          if (qIndex + 1 < QUESTIONS_PER_RUN) {
            setQ((i) => i + 1); setPicked(null); setPhase("situation");
          } else {
            setScreen("final");
          }
        }
      }, [phase, picked, qIndex]);

      const pick = useCallback((opt) => { setPicked(opt); setPhase("reaction"); }, []);

      const total = useMemo(() => scores.reduce((a,b) => a+b, 0), [scores]);
      const bgSrc = useMemo(() => {
        if (screen === "quiz" || screen === "final") return window.SAMPLE_BG[qIndex % window.SAMPLE_BG.length];
        return window.SAMPLE_BG[0];
      }, [screen, qIndex]);

      const rootClass = `vn-root vn-root--${screen}${screen === "title" ? " vn-root--title-paper" : ""}`;
      const dataPhase = screen === "quiz" ? phase : undefined;
      const dataScore = (screen === "quiz" && picked) ? picked.score : undefined;

      return (
        <div className={rootClass} data-phase={dataPhase} data-score={dataScore}>
          {screen !== "title" && <BgStack src={bgSrc} />}
          {screen === "title" && (
            <TitleScreen levels={window.SAMPLE_LEVELS} onStart={start} />
          )}
          {screen === "quiz" && level && (
            <QuizScreen
              level={level}
              qIndex={qIndex}
              total={QUESTIONS_PER_RUN}
              phase={phase}
              picked={picked}
              onAdvance={advance}
              onPick={pick}
              onTitle={toTitle}
            />
          )}
          {screen === "final" && level && (
            <EndingCard level={level} total={total} max={MAX_SCORE} onRestart={toTitle} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
